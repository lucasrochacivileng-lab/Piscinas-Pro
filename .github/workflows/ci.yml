name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-e2e:
    name: Quality and E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run release:validate
      - run: npm test
      - name: TypeScript check
        shell: bash
        run: set -o pipefail; npm run check 2>&1 | tee typecheck.log
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: typecheck-log
          path: typecheck.log
          retention-days: 2

  database:
    name: Migrations, lint and pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: supabase db start
      - run: supabase db lint --local --level warning --fail-on error
      - run: supabase db advisors --local --type all --level warn --fail-on error
      - run: supabase test db --local supabase/tests
      - if: ${{ always() }}
        run: supabase stop --no-backup
